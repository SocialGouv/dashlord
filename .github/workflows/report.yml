name: DashLord report

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["DashLord scans"]
    branches: [main]
    types:
      - completed

# allow only one concurrent report action
concurrency:
  cancel-in-progress: true
  group: report

jobs:
  website:
    runs-on: ubuntu-latest
    name: Website
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      # build the report
      - id: dashlord-report
        uses: SocialGouv/dashlord-actions/report@v1
        with:
          base-path: /dashlord # adapt to your repo name

      # save full report for history
      - uses: EndBug/add-and-commit@v7
        with:
          add: '["report.json"]'
          default_author: "github_actions"
          message: "chore: report update"

      # Save build artifact for self-hosting with nginx/Docker
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashlord-build
          path: build/
          retention-days: 30

